<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#EBF5FF" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('recall-theme');
          var m = document.querySelector('meta[name="theme-color"]');
          if (t === 'dark') {
            document.documentElement.dataset.theme = 'dark';
            if (m) m.setAttribute('content', '#0A1628');
          } else {
            document.documentElement.dataset.theme = 'light';
            if (m) m.setAttribute('content', '#EBF5FF');
          }
        } catch (e) {}
      })();
    </script>
    <meta name="description" content="Recall — dementia care companion with orientation, medication safety, emergency SOS, memory threads, daily routines, and caregiver monitoring." />
    <title>Recall</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/logo.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
