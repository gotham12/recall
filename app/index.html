<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#F8F4EF" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('recall-theme');
          var m = document.querySelector('meta[name="theme-color"]');
          if (t === 'dark') {
            document.documentElement.dataset.theme = 'dark';
            if (m) m.setAttribute('content', '#000000');
          } else {
            document.documentElement.dataset.theme = 'light';
            if (m) m.setAttribute('content', '#F8F4EF');
          }
        } catch (e) {}
      })();
    </script>
    <meta name="description" content="Gentle cognitive care with Clara, medication tracking, and comfort mode." />
    <title>Recall</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
