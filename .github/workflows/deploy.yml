name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install wrangler
        run: npm install
        working-directory: app/proxy

      - name: Deploy Cloudflare worker
        run: npx wrangler deploy
        working-directory: app/proxy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Sync worker secrets
        if: success()
        run: |
          printf '%s' "$GROQ_API_KEY" | npx wrangler secret put GROQ_API_KEY
          printf '%s' "$ELEVENLABS_API_KEY" | npx wrangler secret put ELEVENLABS_API_KEY
          printf '%s' "$GOOGLE_VISION_KEY" | npx wrangler secret put GOOGLE_VISION_KEY
        working-directory: app/proxy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GROQ_API_KEY: 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
          ELEVENLABS_API_KEY: sk_d36c8525b450a193b58231b83a2f2d89a99965a3433c931d
          GOOGLE_VISION_KEY: AIzaSyB3qfZObc0PD8EE7hc9fEHUgHj74GG4DiI

  deploy:
    needs: deploy-worker
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app

      - name: Build
        run: npm run build
        working-directory: app
        env:
          VITE_API_BASE_URL: https://recall-api.almightytamer.workers.dev
          VITE_SUPERVISOR_PASSWORD: care2024

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

      - uses: actions/deploy-pages@v4
        id: deployment
